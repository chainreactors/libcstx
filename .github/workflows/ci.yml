name: CI

on:
  push:
    branches: [main]
    paths:
      - "go/**"
      - "include/**"
      - "ts/**"
  workflow_dispatch:

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run regression tests
        working-directory: go
        run: CGO_ENABLED=1 go test -tags cstx_native -v ./...
