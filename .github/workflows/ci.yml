name: CI

on:
  push:
    branches: [main]
    paths:
      - "go/**"
      - "include/**"
      - "ts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "go/**"
      - "include/**"
      - "ts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Verify generated Go API without CGO
        working-directory: go
        env:
          CGO_ENABLED: "0"
        run: go test ./...
      - name: Run native regression tests
        working-directory: go
        env:
          CGO_ENABLED: "1"
        run: go test -v ./...
